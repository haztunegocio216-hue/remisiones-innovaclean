<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Remisiones Innova Clean V2</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:15px;
}

.contenedor{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h1{
text-align:center;
color:#00A3D7;
}

.info{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
font-size:18px;
box-sizing:border-box;
}

.datos{
display:grid;
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#00A3D7;
color:white;
padding:10px;
}

td{
border:1px solid #ccc;
padding:5px;
}

td input{
font-size:16px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.btnAgregar{
background:#00A3D7;
color:white;
width:100%;
}

.btnGenerar{
background:#28a745;
color:white;
width:100%;
}

.btnNueva{
background:#dc3545;
color:white;
width:100%;
}

.btnEliminar{
background:#dc3545;
color:white;
padding:8px;
}

.resumen{
margin-top:20px;
background:#f7f7f7;
padding:15px;
border-radius:8px;
}

.total{
font-size:32px;
font-weight:bold;
color:green;
}

#ticket{
margin-top:20px;
padding:20px;
background:white;
border:2px dashed #999;
}

@media print{

button{
display:none;
}

body{
background:white;
}

}

</style>
</head>

<body>

<div class="contenedor">

<h1>INNOVA CLEAN</h1>

<div class="info">
<div>Remisión: <span id="folio"></span></div>
<div id="fecha"></div>
</div>

<div class="datos">

<input id="cliente" placeholder="Nombre Cliente">

<input id="telefono" placeholder="Teléfono">

<input id="direccion" placeholder="Dirección">

</div>

<table id="tabla">

<tr>
<th>Cant.</th>
<th>Descripción</th>
<th>P.Unit</th>
<th>Importe</th>
<th>X</th>
</tr>

</table>

<button class="btnAgregar" onclick="agregarFila()">
➕ Agregar Producto
</button>

<div class="resumen">

<p>Descuento:</p>

<input id="descuento"
type="number"
value="0"
oninput="actualizarTotales()">

<h2>Subtotal: $<span id="subtotal">0.00</span></h2>

<h1 class="total">
TOTAL $<span id="total">0.00</span>
</h1>

</div>

<button class="btnGenerar" onclick="generarTicket()">
🧾 Generar Remisión
</button>

<button onclick="window.print()"
class="btnGenerar">
🖨 Imprimir
</button>

<button class="btnNueva"
onclick="nuevaRemision()">
🗑 Nueva Remisión
</button>

<div id="ticket"></div>

</div>

<script>

let folio =
parseInt(
localStorage.getItem("folioInnova")
|| "1"
);

document.getElementById("folio").innerText =
String(folio).padStart(6,"0");

document.getElementById("fecha").innerText =
new Date().toLocaleString();

function agregarFila(){

let tabla =
document.getElementById("tabla");

let fila =
tabla.insertRow();

fila.innerHTML=`

<td>
<input type="number"
value="1"
oninput="actualizarTotales()">
</td>

<td>
<input type="text">
</td>

<td>
<input type="number"
step="0.01"
value="0"
oninput="actualizarTotales()">
</td>

<td class="importe">
0.00
</td>

<td>
<button
class="btnEliminar"
onclick="eliminarFila(this)">
X
</button>
</td>

`;

actualizarTotales();

}

function eliminarFila(btn){

btn.parentNode.parentNode.remove();

actualizarTotales();

}

function actualizarTotales(){

let tabla =
document.getElementById("tabla");

let subtotal = 0;

for(let i=1;i<tabla.rows.length;i++){

let cantidad =
parseFloat(
tabla.rows[i].cells[0]
.children[0].value
)||0;

let precio =
parseFloat(
tabla.rows[i].cells[2]
.children[0].value
)||0;

let importe =
cantidad * precio;

tabla.rows[i].cells[3]
.innerText =
importe.toFixed(2);

subtotal += importe;

}

let descuento =
parseFloat(
document.getElementById("descuento").value
)||0;

let total =
subtotal - descuento;

document.getElementById("subtotal").innerText =
subtotal.toFixed(2);

document.getElementById("total").innerText =
total.toFixed(2);

}

function generarTicket(){

let cliente =
document.getElementById("cliente").value;

let telefono =
document.getElementById("telefono").value;

let direccion =
document.getElementById("direccion").value;

let tabla =
document.getElementById("tabla");

let ticket = `
<h2>INNOVA CLEAN</h2>

<p>
REMISIÓN:
${String(folio).padStart(6,"0")}
</p>

<p>${new Date().toLocaleString()}</p>

<p><b>Cliente:</b> ${cliente}</p>
<p><b>Tel:</b> ${telefono}</p>
<p><b>Dirección:</b> ${direccion}</p>

<hr>
`;

for(let i=1;i<tabla.rows.length;i++){

let cantidad =
tabla.rows[i].cells[0]
.children[0].value;

let producto =
tabla.rows[i].cells[1]
.children[0].value;

let importe =
tabla.rows[i].cells[3]
.innerText;

ticket += `
${cantidad} -
${producto}
.........
$${importe}
<br>
`;

}

ticket += `
<hr>

<h2>
TOTAL $
${document.getElementById("total").innerText}
</h2>

<p>
GRACIAS POR SU PREFERENCIA
</p>
`;

document.getElementById("ticket").innerHTML =
ticket;

}

function nuevaRemision(){

folio++;

localStorage.setItem(
"folioInnova",
folio
);

location.reload();

}

agregarFila();

</script>

</body>
</html>
